  var grid = document.querySelector('.grid');
  var items = Array.prototype.slice.call(grid.children);
  for (var i = items.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));

})();
</script>

<div class="lightbox" id="lightbox" aria-hidden="true">
  <button class="lb-close" aria-label="Close">&times;</button>
  <button class="lb-prev" aria-label="Previous">&lsaquo;</button>
  <button class="lb-next" aria-label="Next">&rsaquo;</button>
  <figure class="lb-stage">
    <img id="lb-img" src="" alt="">
    <figcaption id="lb-cap"></figcaption>
  </figure>
</div>

<script>
(function () {
  var shots = Array.prototype.slice.call(document.querySelectorAll('.grid .shot'));
  var lb = document.getElementById('lightbox');
  var lbImg = document.getElementById('lb-img');
  var lbCap = document.getElementById('lb-cap');
  var months = ['January','February','March','April','May','June','July',
                'August','September','October','November','December'];
  var i = -1;

  function caption(a) {
    var d = a.getAttribute('data-date') || '';
    var p = d.split('-');
    if (p.length < 2) return '';
    return months[parseInt(p[1], 10) - 1] + ' ' + p[0];
  }
  function show(n) {
    i = (n + shots.length) % shots.length;
    var a = shots[i];
    lbImg.src = a.getAttribute('href');
    lbCap.textContent = caption(a);
  }
  function open(n) {
    show(n);
    lb.classList.add('on');
    lb.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }
  function close() {
    lb.classList.remove('on');
    lb.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    lbImg.src = '';
  }
  shots.forEach(function (a, n) {
    a.addEventListener('click', function (e) { e.preventDefault(); open(n); });
  });
  lb.querySelector('.lb-close').addEventListener('click', close);
  lb.querySelector('.lb-next').addEventListener('click', function (e) { e.stopPropagation(); show(i + 1); });
  lb.querySelector('.lb-prev').addEventListener('click', function (e) { e.stopPropagation(); show(i - 1); });
  lb.addEventListener('click', function (e) { if (e.target === lb || e.target.classList.contains('lb-stage')) close(); });
  document.addEventListener('keydown', function (e) {
    if (!lb.classList.contains('on')) return;
    if (e.key === 'Escape') close();
    else if (e.key === 'ArrowRight') show(i + 1);
    else if (e.key === 'ArrowLeft') show(i - 1);
  });
})();
</script>
